# /etc/nginx/conf.d/sezi-ws-shim.conf
#
# WS-101 KÖPRÜSÜ (cloudflared yolu için) — RESMÎ ADIM.
#
# SORUN: cloudflared → wrangler-dev-Node-proxy → workerd zincirinde WebSocket
# upgrade (HTTP 101) TAKILIR. Kök neden = wrangler-dev'in Node-proxy katmanının
# Upgrade/Connection başlıklarını her durumda doğru geçirmemesi. Semptom: HTTP
# API çalışır ama /sync canlı-teslim (WS) kurulmaz → mesaj gecikir/gelmez.
#
# ÇÖZÜM: araya ince bir nginx-shim koy. cloudflared → nginx(:8787) → wrangler(:8788).
# nginx, Upgrade/Connection başlıklarını AÇIKÇA normalleştirir + WS için uzun
# read-timeout verir → 101 geçer. (Hepsi 127.0.0.1: hiçbir şey public değil;
# cloudflared aynı makinede localhost'a bağlanır.)
#
# KALICI ÇÖZÜM: bu shim, wrangler-dev'in dev-server doğasından kaynaklı bir
# GEÇİCİ köprüdür. Faz-3 native `sezi-serverd` (axum) WS'yi yerel olarak
# yönetince shim GEREKMEZ. caddy yolunu (deploy/Caddyfile) seçersen de gerekmez:
# caddy Upgrade'i doğal proxy'ler.
#
# KURULUM:
#   sudo apt install -y nginx
#   sudo cp deploy/sezi-ws-shim.conf /etc/nginx/conf.d/
#   sudo nginx -t && sudo systemctl reload nginx
#   # cloudflared Public Hostname servis-URL'ini http://127.0.0.1:8787 yap.

# WS için Connection başlığı: upgrade varsa "upgrade", yoksa "close" (normal HTTP).
map $http_upgrade $sezi_connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    # SADECE localhost: cloudflared bu makinede çalışır, buraya bağlanır. Public DEĞİL.
    listen 127.0.0.1:8787;
    server_name _;

    location / {
        proxy_pass http://127.0.0.1:8788;   # wrangler dev (sezi-relay.service)
        proxy_http_version 1.1;

        # WS-101 için ZORUNLU başlıklar:
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $sezi_connection_upgrade;
        proxy_set_header Host       $host;

        # cf-connecting-ip: cloudflared GERÇEK istemci IP'sini zaten koyar (CF-edge
        # trafiği). DOKUNMA — pass-through: per-IP rate-limit (bootstrap/verify)
        # gerçek istemciyi görsün. (Burada $remote_addr'a EZERSEK hepsi tek IP'ye
        # düşer = per-IP limit çöker. O yüzden bilinçli set ETMİYORUZ.)

        # WebSocket uzun-ömür: canlı /sync bağlantısı gün-mertebesi açık kalır.
        proxy_read_timeout  7d;
        proxy_send_timeout  7d;
        proxy_buffering     off;
    }
}
